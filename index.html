<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <title>touche-hub</title>
  </head>
  <body>
    <main class="main-body">
      <section class="main-items">
        <div class="item1" id="about">
          <div class="logo">
            <h1>Logo</h1>
          </div>
          <div class="bio">
            <h1>Bio</h1>
          </div>
        </div>
        <div class="item2" id="experience">
          <h1>Work Experience</h1>
        </div>
        <div class="item3" id="projects">
          <h1>Projects</h1>
        </div>
        <div class="item4" id="contact">
          <h1>Contacts</h1>
        </div>
      </section>
      <section class="nav-bar">
        <div class="container-fluid m-1 sticky-top">
          <div class="container-fluid profile-pic">
            <img
              src="assets/img/profile-pic.jpg"
              class="img-fluid"
              alt="avatar"
            />
          </div>
          <div class="container-fluid profile-contact">
            <h5>Contact Info Here</h5>
          </div>
          <nav class="navbar navbar-light">
            <div class="container-fluid">
              <div class="navbar-nav nav-items">
                <a class="nav-link" href="#about">About</a>
                <a class="nav-link" href="#experience">Work Experience</a>
                <a class="nav-link" href="#projects">Projects</a>
                <a class="nav-link" href="#contact">Contact</a>
              </div>
            </div>
          </nav>
        </div>
      </section>
    </main>
  </body>
</html>
